# ==============================================================================
# Gallery Generator Application Configuration Profile
# ==============================================================================

# Absolute path to the directory containing raw gallery folders and source images.
source_dir=/mnt/F/mess/hrady

# Absolute path to the destination folder where processed galleries will be generated.
target_dir=/mnt/F/mess/gallery/output

# Scaling factor (in percent) applied to both width and height for primary downsized output images.
# This is ignored if target_image_max_size is specified.
target_image_resolution_pct=25

# Optional: Maximum length in pixels for the longest side of primary output images.
# If specified, this takes precedence over target_image_resolution_pct.
target_image_max_size=1392

# The maximum length in pixels constraint for the longest side of generated preview thumbnails.
target_preview_max_side_px=400

# Name of the sub-folder created inside each target gallery to hold preview thumbnails.
target_preview_dir_name=preview

# Case-insensitive wildcard pattern matching image source files that need to be processed.
files_to_process_mask=*.jpg, *.png

# Case-insensitive wildcard pattern for files that must be copied directly without resizing.
# Preview generation still runs for these matching targets.
do_not_resize_files_mask=_map*.*

# Case-insensitive wildcard matching the main Windows-1250 text index file containing definitions.
metadata_file_mask=_index.txt

# Case-insensitive wildcard matching the optional side-car summary text block injected into the note tag.
additional_file_mask=_note.txt

# Case-insensitive folder naming pattern indicating which tree subdirectories must be completely skipped.
excluded_subdirectories_mask=video

# Multi-pattern naming template mapping image text identifiers inside the index. Separate multiple options with a comma.
metadata_ID_to_image_mapping=DSC_<ID>.jpg, DSC<ID>.jpg

# Case-insensitive wildcards matching files that should bypass validation warnings for chybějící popisy.
no_comments_files_mask=_map*.*,_cedule*.*,_rekonstrukce*.*

# Filename for the local pretty-printed index tracking the individual components inside each gallery node.
gallery_JSON_name=index.json

# Filename for the primary root summary catalog index written directly into the main target location.
root_JSON_name=root.json

# If set to true, the tool performs dry-run structural scans and logs warning definitions without writing files.
check_only=false

# If set to true, the system outputs deep step-by-step progress execution traces for individual files.
verbose=false

# Max no of worker threads. If set to 0, application detects number of logical processors (threads) of the CPU.
thread_count=0

# Flag tracking whether original source metadata headers (EXIF data blocks) should be injected back into downsized images (not into previews).
copy_exif=false

# If set to true, a watermark is added to the lower right corner of resized images (not previews).
includeWatermark=true

# If set to true, the target directory is deleted and all images are regenerated (default behavior).
# If set to false, existing images and previews are preserved; only missing files are created. JSON files are always regenerated.
regenerateExistingImages=false
